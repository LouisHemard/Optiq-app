name: CI/CD — OPTIQ

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # Séquence 1 — Intégration Backend (NestJS)
  # ============================================================
  backend-ci:
    name: Backend — Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      - name: Génération du client Prisma
        run: npx prisma generate

      - name: Vérification du lint
        run: npm run lint

      - name: Lancement des tests unitaires (Jest)
        run: npm run test

  # ============================================================
  # Séquence 2 — Intégration Frontend (React + Vite)
  # ============================================================
  frontend-ci:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      - name: Vérification du lint
        run: npm run lint

      - name: Build de production
        run: npm run build

  # ============================================================
  # Séquence 3 — Déploiement Continu (simulation)
  # ============================================================
  deploy:
    name: Déploiement Production
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Simulation du déploiement
        run: |
          echo "============================================="
          echo "Déploiement de la version en production..."
          echo "============================================="
          echo "Commit       : ${{ github.sha }}"
          echo "Branche      : ${{ github.ref_name }}"
          echo "Déclencheur  : ${{ github.actor }}"
          echo "Date         : $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "---------------------------------------------"
          echo "1/4 - Build des images Docker (backend + client)..."
          echo "2/4 - Push vers le registry..."
          echo "3/4 - Migrations Prisma sur PostgreSQL prod..."
          echo "4/4 - Bascule du trafic vers la nouvelle version..."
          echo "============================================="
          echo "Déploiement terminé avec succès."
