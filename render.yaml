services:
  - type: web
    name: optiq-backend
    runtime: node
    rootDir: server
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm run start:prod
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: APP_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: Picture
      - key: SENTRY_DSN
        sync: false
