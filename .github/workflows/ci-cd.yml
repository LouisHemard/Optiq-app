name: CI/CD — OPTIQ

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # Séquence 1 — Intégration Backend (NestJS)
  # ============================================================
  backend-ci:
    name: Backend — Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      - name: Génération du client Prisma
        run: npx prisma generate

      - name: Vérification du lint
        run: npm run lint

      - name: Lancement des tests unitaires (Jest)
        run: npm run test

  # ============================================================
  # Séquence 2 — Intégration Frontend (React + Vite)
  # ============================================================
  frontend-ci:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      - name: Vérification du lint
        run: npm run lint

      - name: Build de production
        run: npm run build

  # ============================================================
  # Séquence 3 — Déploiement Continu
  # ============================================================
  deploy:
    name: Déploiement Production
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Déploiement backend (Render)
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --request POST "${{ secrets.RENDER_DEPLOY_HOOK }}" | grep -q "^2" \
            && echo "Render deploy déclenché avec succès." \
            || (echo "Échec du déclenchement Render." && exit 1)

      - name: Résumé du déploiement
        run: |
          echo "Commit    : ${{ github.sha }}"
          echo "Branche   : ${{ github.ref_name }}"
          echo "Acteur    : ${{ github.actor }}"
          echo "Date      : $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "Backend   : Render (redéploiement déclenché)"
          echo "Frontend  : Vercel (redéploiement automatique via GitHub)"
